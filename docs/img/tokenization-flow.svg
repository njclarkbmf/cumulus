<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" font-family="system-ui, -apple-system, sans-serif">
  <rect width="900" height="450" fill="#f8f9fa"/>
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">Property Tokenization Flow</text>
  
  <!-- Columns -->
  <rect x="30" y="50" width="170" height="35" rx="5" fill="#fef9ec" stroke="#e8971e"/>
  <text x="115" y="73" text-anchor="middle" font-size="13" font-weight="600" fill="#7c5a00">Admin</text>
  
  <rect x="250" y="50" width="170" height="35" rx="5" fill="#eef2ff" stroke="#6366f1"/>
  <text x="335" y="73" text-anchor="middle" font-size="13" font-weight="600" fill="#3730a3">Frontend</text>
  
  <rect x="470" y="50" width="180" height="35" rx="5" fill="#f5f3ff" stroke="#8b5cf6"/>
  <text x="560" y="73" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6">PropertyNFT Contract</text>
  
  <rect x="700" y="50" width="170" height="35" rx="5" fill="#ecfdf5" stroke="#10b981"/>
  <text x="785" y="73" text-anchor="middle" font-size="13" font-weight="600" fill="#065f46">Registry Contract</text>
  
  <!-- Lifelines -->
  <line x1="115" y1="85" x2="115" y2="430" stroke="#e8971e" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="335" y1="85" x2="335" y2="430" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="560" y1="85" x2="560" y2="430" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="785" y1="85" x2="785" y2="430" stroke="#10b981" stroke-width="2" stroke-dasharray="4,4"/>
  
  <!-- Steps -->
  <line x1="115" y1="115" x2="335" y2="115" stroke="#333" stroke-width="2" marker-end="url(#b)"/>
  <rect x="135" y="102" width="180" height="22" rx="3" fill="#fff" stroke="#ccc"/>
  <text x="225" y="117" text-anchor="middle" font-size="10">1. Create property</text>
  
  <rect x="335" y="145" width="170" height="30" rx="5" fill="#eef2ff" stroke="#6366f1"/>
  <text x="420" y="160" text-anchor="middle" font-size="10">2. Upload to IPFS</text>
  <text x="420" y="173" text-anchor="middle" font-size="9" fill="#3730a3">(Pinata)</text>
  
  <rect x="335" y="190" width="170" height="25" rx="5" fill="#eef2ff" stroke="#6366f1"/>
  <text x="420" y="207" text-anchor="middle" font-size="10">3. Get IPFS URI</text>
  
  <line x1="115" y1="235" x2="335" y2="235" stroke="#333" stroke-width="2" marker-end="url(#b)"/>
  <rect x="135" y="222" width="180" height="22" rx="3" fill="#fff" stroke="#ccc"/>
  <text x="225" y="237" text-anchor="middle" font-size="10">4. Deploy PropertyNFT</text>
  
  <line x1="335" y1="275" x2="560" y2="275" stroke="#8b5cf6" stroke-width="2" marker-end="url(#b)"/>
  <rect x="355" y="262" width="180" height="22" rx="3" fill="#f5f3ff" stroke="#8b5cf6"/>
  <text x="445" y="277" text-anchor="middle" font-size="10">5. Deploy contract</text>
  
  <line x1="335" y1="315" x2="785" y2="315" stroke="#10b981" stroke-width="2" marker-end="url(#b)"/>
  <rect x="400" y="302" width="350" height="22" rx="3" fill="#ecfdf5" stroke="#10b981"/>
  <text x="575" y="317" text-anchor="middle" font-size="10">6. Register property in Registry</text>
  
  <rect x="785" y="340" width="160" height="30" rx="5" fill="#ecfdf5" stroke="#10b981"/>
  <text x="865" y="355" text-anchor="middle" font-size="10">7. Store property info</text>
  <text x="865" y="368" text-anchor="middle" font-size="9" fill="#065f46">(on-chain)</text>
  
  <line x1="115" y1="395" x2="560" y2="395" stroke="#8b5cf6" stroke-width="2" marker-end="url(#b)"/>
  <rect x="200" y="382" width="330" height="22" rx="3" fill="#fff" stroke="#ccc"/>
  <text x="365" y="397" text-anchor="middle" font-size="10">8. Mint tokens (e.g., 100 tokens)</text>
  
  <rect x="560" y="415" width="180" height="25" rx="5" fill="#f5f3ff" stroke="#8b5cf6"/>
  <text x="650" y="432" text-anchor="middle" font-size="10">9. Initialize maintenance tracking</text>
  
  <defs>
    <marker id="b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
</svg>

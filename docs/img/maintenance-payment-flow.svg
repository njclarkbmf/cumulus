<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 380" font-family="system-ui, -apple-system, sans-serif">
  <rect width="850" height="380" fill="#f8f9fa"/>
  <text x="425" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">Maintenance Fee Payment Flow</text>
  
  <!-- Column headers -->
  <rect x="30" y="50" width="170" height="35" rx="5" fill="#fef9ec" stroke="#e8971e"/>
  <text x="115" y="73" text-anchor="middle" font-size="13" font-weight="600" fill="#7c5a00">User</text>
  
  <rect x="250" y="50" width="170" height="35" rx="5" fill="#eef2ff" stroke="#6366f1"/>
  <text x="335" y="73" text-anchor="middle" font-size="13" font-weight="600" fill="#3730a3">Frontend</text>
  
  <rect x="470" y="50" width="180" height="35" rx="5" fill="#f5f3ff" stroke="#8b5cf6"/>
  <text x="560" y="73" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6">PropertyNFT Contract</text>
  
  <rect x="700" y="50" width="120" height="35" rx="5" fill="#ecfdf5" stroke="#10b981"/>
  <text x="760" y="73" text-anchor="middle" font-size="13" font-weight="600" fill="#065f46">Backend</text>
  
  <!-- Lifelines -->
  <line x1="115" y1="85" x2="115" y2="360" stroke="#e8971e" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="335" y1="85" x2="335" y2="360" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="560" y1="85" x2="560" y2="360" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="760" y1="85" x2="760" y2="360" stroke="#10b981" stroke-width="2" stroke-dasharray="4,4"/>
  
  <!-- Step 1: View Dashboard -->
  <line x1="115" y1="115" x2="335" y2="115" stroke="#333" stroke-width="2" marker-end="url(#arrow2)"/>
  <rect x="135" y="102" width="180" height="22" rx="3" fill="#fff" stroke="#ccc"/>
  <text x="225" y="117" text-anchor="middle" font-size="10">1. View "Maintenance due: ₱500"</text>
  
  <!-- Step 2: Click Pay Now -->
  <line x1="115" y1="155" x2="335" y2="155" stroke="#333" stroke-width="2" marker-end="url(#arrow2)"/>
  <rect x="135" y="142" width="180" height="22" rx="3" fill="#fff" stroke="#ccc"/>
  <text x="225" y="157" text-anchor="middle" font-size="10">2. Click "Pay Now"</text>
  
  <!-- Step 3: Confirm Payment -->
  <line x1="115" y1="195" x2="335" y2="195" stroke="#333" stroke-width="2" marker-end="url(#arrow2)"/>
  <rect x="135" y="182" width="180" height="22" rx="3" fill="#fff" stroke="#ccc"/>
  <text x="225" y="197" text-anchor="middle" font-size="10">3. Confirm (sign tx)</text>
  
  <!-- Step 4: payMaintenance() -->
  <line x1="335" y1="235" x2="560" y2="235" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow2)"/>
  <rect x="355" y="222" width="180" height="22" rx="3" fill="#f5f3ff" stroke="#8b5cf6"/>
  <text x="445" y="237" text-anchor="middle" font-size="10">4. payMaintenance() + ₱500</text>
  
  <!-- Step 5: Update timestamp -->
  <rect x="560" y="265" width="180" height="25" rx="5" fill="#f5f3ff" stroke="#8b5cf6"/>
  <text x="650" y="282" text-anchor="middle" font-size="10">5. Update lastPaid timestamp</text>
  
  <!-- Step 6: Transfer to treasury -->
  <rect x="560" y="300" width="180" height="25" rx="5" fill="#f5f3ff" stroke="#8b5cf6"/>
  <text x="650" y="317" text-anchor="middle" font-size="10">6. Transfer to treasury</text>
  
  <!-- Step 7: Emit event -->
  <rect x="560" y="335" width="180" height="25" rx="5" fill="#f5f3ff" stroke="#8b5cf6"/>
  <text x="650" y="352" text-anchor="middle" font-size="10">7. Emit MaintenancePaid event</text>
  
  <!-- Step 8: Indexer catches event -->
  <line x1="560" y1="360" x2="760" y2="360" stroke="#10b981" stroke-width="2" marker-end="url(#arrow2)" stroke-dasharray="5,3"/>
  
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
</svg>

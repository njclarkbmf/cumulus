<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" font-family="system-ui, -apple-system, sans-serif">
  <rect width="900" height="450" fill="#f8f9fa"/>
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">User Registration + KYC Flow</text>
  
  <!-- Column headers -->
  <rect x="30" y="50" width="170" height="35" rx="5" fill="#fef9ec" stroke="#e8971e"/>
  <text x="115" y="73" text-anchor="middle" font-size="13" font-weight="600" fill="#7c5a00">User</text>
  
  <rect x="250" y="50" width="170" height="35" rx="5" fill="#eef2ff" stroke="#6366f1"/>
  <text x="335" y="73" text-anchor="middle" font-size="13" font-weight="600" fill="#3730a3">Frontend</text>
  
  <rect x="470" y="50" width="170" height="35" rx="5" fill="#ecfdf5" stroke="#10b981"/>
  <text x="555" y="73" text-anchor="middle" font-size="13" font-weight="600" fill="#065f46">Backend</text>
  
  <rect x="690" y="50" width="180" height="35" rx="5" fill="#f5f3ff" stroke="#8b5cf6"/>
  <text x="780" y="73" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6">Registry Contract</text>
  
  <!-- Lifelines -->
  <line x1="115" y1="85" x2="115" y2="430" stroke="#e8971e" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="335" y1="85" x2="335" y2="430" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="555" y1="85" x2="555" y2="430" stroke="#10b981" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="780" y1="85" x2="780" y2="430" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4,4"/>
  
  <!-- Steps -->
  <line x1="115" y1="115" x2="335" y2="115" stroke="#333" stroke-width="2" marker-end="url(#a)"/>
  <rect x="135" y="102" width="180" height="22" rx="3" fill="#fff" stroke="#ccc"/>
  <text x="225" y="117" text-anchor="middle" font-size="10">1. Connect Wallet</text>
  
  <line x1="115" y1="155" x2="335" y2="155" stroke="#333" stroke-width="2" marker-end="url(#a)"/>
  <rect x="135" y="142" width="180" height="22" rx="3" fill="#fff" stroke="#ccc"/>
  <text x="225" y="157" text-anchor="middle" font-size="10">2. Submit KYC info</text>
  
  <line x1="335" y1="195" x2="555" y2="195" stroke="#333" stroke-width="2" marker-end="url(#a)"/>
  <rect x="355" y="182" width="180" height="22" rx="3" fill="#fff" stroke="#ccc"/>
  <text x="445" y="197" text-anchor="middle" font-size="10">3. POST /api/users/kyc</text>
  
  <rect x="555" y="225" width="170" height="30" rx="5" fill="#ecfdf5" stroke="#10b981"/>
  <text x="640" y="240" text-anchor="middle" font-size="10">4. Store in DB (encrypted)</text>
  <text x="640" y="253" text-anchor="middle" font-size="9" fill="#065f46">+ KYC provider API</text>
  
  <rect x="555" y="270" width="170" height="30" rx="5" fill="#ecfdf5" stroke="#10b981"/>
  <text x="640" y="290" text-anchor="middle" font-size="10">5. KYC verified ✓</text>
  
  <line x1="555" y1="320" x2="780" y2="320" stroke="#8b5cf6" stroke-width="2" marker-end="url(#a)"/>
  <rect x="575" y="307" width="180" height="22" rx="3" fill="#f5f3ff" stroke="#8b5cf6"/>
  <text x="665" y="322" text-anchor="middle" font-size="10">6. setKYCStatus()</text>
  
  <rect x="780" y="345" width="170" height="30" rx="5" fill="#f5f3ff" stroke="#8b5cf6"/>
  <text x="865" y="360" text-anchor="middle" font-size="10">7. Update kycData</text>
  <text x="865" y="373" text-anchor="middle" font-size="9" fill="#5b21b6">(on-chain)</text>
  
  <line x1="555" y1="395" x2="335" y2="395" stroke="#10b981" stroke-width="2" marker-end="url(#a)" stroke-dasharray="5,3"/>
  <line x1="335" y1="420" x2="115" y2="420" stroke="#10b981" stroke-width="2" marker-end="url(#a)" stroke-dasharray="5,3"/>
  <rect x="135" y="407" width="180" height="22" rx="3" fill="#ecfdf5" stroke="#10b981"/>
  <text x="225" y="422" text-anchor="middle" font-size="10">8. KYC Complete ✓</text>
  
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
</svg>

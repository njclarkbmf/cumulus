<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="280" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">Compliance Architecture (ADR-004)</text>
  
  <!-- Off-Chain -->
  <rect x="30" y="50" width="360" height="210" rx="10" fill="#fff" stroke="#6366f1" stroke-width="2"/>
  <rect x="30" y="50" width="360" height="35" rx="10" fill="#6366f1"/>
  <text x="210" y="73" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Off-Chain (Backend + Database)</text>
  
  <rect x="50" y="100" width="150" height="55" rx="5" fill="#eef2ff" stroke="#a5b4fc"/>
  <text x="125" y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#3730a3">KYC Documents</text>
  <text x="125" y="138" text-anchor="middle" font-size="9" fill="#3730a3">(encrypted storage)</text>
  
  <rect x="220" y="100" width="150" height="55" rx="5" fill="#eef2ff" stroke="#a5b4fc"/>
  <text x="295" y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#3730a3">Third-Party Verification</text>
  <text x="295" y="138" text-anchor="middle" font-size="9" fill="#3730a3">(Onfido / Jumio)</text>
  
  <rect x="50" y="170" width="150" height="55" rx="5" fill="#eef2ff" stroke="#a5b4fc"/>
  <text x="125" y="190" text-anchor="middle" font-size="10" font-weight="600" fill="#3730a3">Identity Verification</text>
  <text x="125" y="208" text-anchor="middle" font-size="9" fill="#3730a3">(workflow engine)</text>
  
  <rect x="220" y="170" width="150" height="55" rx="5" fill="#eef2ff" stroke="#a5b4fc"/>
  <text x="295" y="190" text-anchor="middle" font-size="10" font-weight="600" fill="#3730a3">PII Data Storage</text>
  <text x="295" y="208" text-anchor="middle" font-size="9" fill="#c00000">(never on-chain)</text>
  
  <!-- On-Chain -->
  <rect x="430" y="50" width="340" height="210" rx="10" fill="#fff" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="430" y="50" width="340" height="35" rx="10" fill="#8b5cf6"/>
  <text x="600" y="73" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">On-Chain (Smart Contracts)</text>
  
  <rect x="450" y="100" width="145" height="55" rx="5" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="522" y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">KYC Status Flag</text>
  <text x="522" y="138" text-anchor="middle" font-size="9" fill="#5b21b6">(verified: true/false)</text>
  
  <rect x="610" y="100" width="145" height="55" rx="5" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="682" y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">Nationality String</text>
  <text x="682" y="138" text-anchor="middle" font-size="9" fill="#5b21b6">(non-PII)</text>
  
  <rect x="450" y="170" width="145" height="55" rx="5" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="522" y="190" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">Foreign Ownership %</text>
  <text x="522" y="208" text-anchor="middle" font-size="9" fill="#5b21b6">(per property)</text>
  
  <rect x="610" y="170" width="145" height="55" rx="5" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="682" y="190" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">Transfer Gate</text>
  <text x="682" y="208" text-anchor="middle" font-size="9" fill="#5b21b6">(KYC + cap check)</text>
  
  <!-- Connection -->
  <line x1="390" y1="155" x2="430" y2="155" stroke="#666" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="410" y="145" font-size="10" fill="#666">Hybrid</text>
</svg>
